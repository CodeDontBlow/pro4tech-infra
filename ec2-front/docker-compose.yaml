services:

  # front next
  frontend:
    build:
      context: ./pro4tech-frontend        # repo clonado 
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: pro4tech-frontend:latest
    container_name: frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - front-net

  # mobile expo web exportado como estático (nginx serve os arquivos) 
  mobile:
    build:
      context: ./pro4tech-mobile          # repo clonado 
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_URL_WEB:     ${EXPO_PUBLIC_API_URL_WEB}
        EXPO_PUBLIC_API_URL_ANDROID: ${EXPO_PUBLIC_API_URL_ANDROID}
    image: pro4tech-mobile:latest
    container_name: mobile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - front-net

  # ── Proxy Reverso (Nginx) ────────────────────────────────────
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - mobile
    networks:
      - front-net

  # ── Certbot ──────────────────────────────────────────────────
  # Roda uma vez para emitir os certificados.
  # Para renovar manualmente: docker compose run --rm certbot renew
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos
      --no-eff-email
      -d web.orbita4tech.hopto.org
      -d orbita4tech.hopto.org
    restart: "no"

volumes:
  certbot-certs:
  certbot-www:

networks:
  front-net:
    driver: bridge